apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "analytics-service.fullname" . }}
  labels: {{- include "analytics-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "analytics-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "analytics-service.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8005"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: analytics-service
          image: "{{ .Values.global.imageRegistry | default "" }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "8005"
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.global.kafkaBootstrap | quote }}
            - name: DB_PATH
              value: /data/analytics.db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.jwtSecretName }}
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "analytics-service.fullname" . }}-pvc
