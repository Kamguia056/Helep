---
# Strimzi Kafka Cluster — 3-broker KRaft cluster (no Zookeeper).
# Prerequisite: install the Strimzi operator first:
#   kubectl create namespace strimzi-operator
#   helm install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
#     --namespace strimzi-operator --set watchNamespaces="{helep}"
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: helep-kafka
  namespace: helep
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # 3 partitions: all HELEP topic keys (incident_id) distribute evenly.
      num.partitions: 3
      log.retention.hours: 168
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 10Gi
          deleteClaim: false
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
    readinessProbe:
      initialDelaySeconds: 30
      timeoutSeconds: 10
    livenessProbe:
      initialDelaySeconds: 30
      timeoutSeconds: 10
  zookeeper:
    # KRaft mode — this block is intentionally minimal (Strimzi ≥ 0.40 handles KRaft natively).
    replicas: 3
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
  entityOperator:
    topicOperator: {}
    userOperator: {}
