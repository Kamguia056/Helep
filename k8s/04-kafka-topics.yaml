---
# KafkaTopic CRDs — one per logical stream.
# Strimzi Topic Operator watches these and creates/updates topics automatically.
# 3 partitions: keyed by incident_id → same-key events on same partition → ordering preserved.
# replicationFactor: 3 for HA.

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: user-registered
  namespace: helep
  labels:
    strimzi.io/cluster: helep-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000   # 7 days
    min.insync.replicas: "2"
---
