---
# IMPORTANT: In a real deployment, generate this with:
#   kubectl create secret generic helep-jwt-secret \
#     --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
#     --namespace helep --dry-run=client -o yaml | kubeseal > sealed-secret.yaml
#
# The placeholder below is for CI smoke tests only — rotate before production.
apiVersion: v1
kind: Secret
metadata:
  name: helep-jwt-secret
  namespace: helep
  annotations:
    description: "JWT signing secret for all HELEP microservices."
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET_BEFORE_DEPLOY"
